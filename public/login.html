<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: var(--gray-900); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .login-card h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .login-card p {
            color: var(--gray-500);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-card .form-group { margin-bottom: 20px; }
        .login-card .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 8px;
        }
        .login-error {
            display: none;
            background: #fecaca;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .login-error.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>CRM</h1>
        <p>Gestiune Contracte & Acces</p>

        <div class="login-error" id="error">Utilizator sau parola incorecta</div>

        <form onsubmit="doLogin(event)">
            <div class="form-group">
                <label>Utilizator</label>
                <input type="text" id="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Parola</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Intra in cont</button>
        </form>
    </div>

<script>
async function doLogin(e) {
    e.preventDefault();
    document.getElementById('error').classList.remove('show');
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            window.location.href = '/';
        } else {
            document.getElementById('error').classList.add('show');
        }
    } catch(err) {
        document.getElementById('error').classList.add('show');
    }
}
</script>
</body>
</html>
