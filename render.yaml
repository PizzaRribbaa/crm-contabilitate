databases:
  - name: crm-db
    plan: starter
    databaseName: crm
    user: crm_user

services:
  - type: web
    name: crm-contabilitate
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CRM_USER
        value: admin
      - key: CRM_PASS
        sync: false
